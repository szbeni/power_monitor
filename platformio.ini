; ESP32-C3 SuperMini + JSY-MK-194G load2 monitor for ESS
[platformio]
default_envs = esp32c3-supermini

[env]
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
upload_speed = 921600

build_flags =
  -std=c++17
  -std=gnu++17
  -Wall -Wextra
  -D MYCILA_JSON_SUPPORT
  -D MYCILA_JSY_ASYNC_CORE=0
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D CORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_WARN

build_unflags =
  -std=gnu++11

lib_deps =
  mathieucarbou/MycilaJSY @ ^15.3.10
  bblanchon/ArduinoJson @ ^7.4.3
  256dpi/MQTT @ ^2.5.2

; MycilaJSY requires pioarduino (Arduino Core 3)
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip

[env:esp32c3-supermini]
board = esp32-c3-devkitm-1
board_build.flash_mode = dio
board_build.partitions = default.csv
; Uncomment if your SuperMini needs a specific upload port:
; upload_port = /dev/ttyACM0
; monitor_port = /dev/ttyACM0
